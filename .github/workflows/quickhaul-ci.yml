name: QuickHaul CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci.yml'

permissions:
  id-token: write
  contents: write
  pull-requests: read

env:
  ACR_NAME: resolveopsacr03
  ACR_LOGIN_SERVER: resolveopsacr03.azurecr.io
  AZURE_RESOURCE_GROUP: sathvik-rg

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      dev_image_tag: ${{ steps.vars.outputs.dev_image_tag }}
      candidate_tag: ${{ steps.vars.outputs.candidate_tag }}
    steps:
      - name: Calculate Variables
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "dev_image_tag=dev-pr-${{ github.event.pull_request.number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "dev_image_tag=dev-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "candidate_tag=main-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_services_json: ${{ steps.detect.outputs.changed_services_json }}
      skip_build: ${{ steps.detect.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Changed Services
        id: detect
        run: |
          cat << 'EOF' > detect.py
          import yaml, json, subprocess, fnmatch, sys
          with open('.github/service-map/quickhaul-services.yml', 'r') as f:
              service_map = yaml.safe_load(f)
          event_name = '${{ github.event_name }}'
          if event_name == 'pull_request':
              base_sha = '${{ github.event.pull_request.base.sha }}'
              head_sha = '${{ github.event.pull_request.head.sha }}'
              cmd = f"git diff --name-only {base_sha} {head_sha}"
          else:
              before = '${{ github.event.before }}'
              sha = '${{ github.sha }}'
              if before and before != '0000000000000000000000000000000000000000':
                  cmd = f"git diff --name-only {before} {sha}"
              else:
                  cmd = f"git diff --name-only HEAD^ HEAD"
          try:
              output = subprocess.check_output(cmd, shell=True, text=True)
          except subprocess.CalledProcessError:
              output = ""
          changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
          
          # Check for shared code changes
          shared_changed = False
          for file in changed_files:
              if file.startswith("quickhaul/backend/shared/"):
                  shared_changed = True
                  break
                  
          changed_services = []
          for svc, details in service_map.items():
              if shared_changed and details['context_path'] == "quickhaul/backend":
                  changed_services.append(details)
                  continue
              changed = False
              for file in changed_files:
                  for path in details['source_paths']:
                      if fnmatch.fnmatch(file, path):
                          changed = True
                          break
                  if changed:
                      break
              if changed:
                  changed_services.append(details)
          with open('output.json', 'w') as f:
              json.dump(changed_services, f)
          EOF
          python3 -m pip install pyyaml
          python3 detect.py
          JSON_OUT=$(cat output.json)
          echo "changed_services_json=$JSON_OUT" >> $GITHUB_OUTPUT
          if [ "$JSON_OUT" == "[]" ]; then
             echo "skip_build=true" >> $GITHUB_OUTPUT
          else
             echo "skip_build=false" >> $GITHUB_OUTPUT
          fi
          echo "Changed services:"
          echo "$JSON_OUT" | jq .

  sast-sonar-scan:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: true
      run_snyk: false
      run_trivy: false

  sca-snyk-scan:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: false
      run_snyk: true
      run_trivy: false

  helm-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Helm Lint
        run: helm lint quickhaul/helm/quickhaul
      - name: Helm Template Dev
        run: helm template quickhaul-dev quickhaul/helm/quickhaul -n quickhaul-dev -f quickhaul/helm/quickhaul/values-dev.yaml
      - name: Helm Template Prod
        run: helm template quickhaul-prod quickhaul/helm/quickhaul -n quickhaul-prod -f quickhaul/helm/quickhaul/values-prod.yaml

  # ==========================================
  # DEV FLOW (PUSH TO DEV)
  # ==========================================
  build-dev-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [setup, detect-changed-services, sast-sonar-scan, sca-snyk-scan, helm-validation]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ env.ACR_NAME }}
      acr_login_server: ${{ env.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: ${{ needs.setup.outputs.dev_image_tag }}

  update-dev-helm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [setup, detect-changed-services, build-dev-images]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
      max-parallel: 1
    uses: Resolveops-AI/resolveops-templates/.github/workflows/helm-updater-template.yml@main
    secrets: inherit
    with:
      values_file: "quickhaul/helm/quickhaul/values-dev.yaml"
      image_tag_key: ${{ matrix.service.helm_values_tag_key }}
      image_tag: ${{ needs.setup.outputs.dev_image_tag }}
      branch_name: "dev"
      commit_message: "chore: update ${{ matrix.service.image_name }} dev tag [skip ci]"

  sync-argo-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: [update-dev-helm]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/cd-reusable-template.yml@main
    secrets: inherit
    with:
      argocd_app_name: quickhaul-dev

  # ==========================================
  # MAIN FLOW (PROD IMAGES)
  # ==========================================
  calculate-semver:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [detect-changed-services, sast-sonar-scan, sca-snyk-scan, helm-validation]
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate Next Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          release_branches: main

  prod-approval-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [calculate-semver]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production environment approved!"

  release-prod-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [setup, detect-changed-services, calculate-semver, prod-approval-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Retag and Push Images
        run: |
          VERSION="${{ needs.calculate-semver.outputs.new_version }}"
          echo '${{ needs.detect-changed-services.outputs.changed_services_json }}' > changed.json
          
          # Read existing dev tags from values-dev.yaml
          cat << 'EOF' > retag.py
          import yaml, json, subprocess
          with open('changed.json', 'r') as f:
              changed = json.load(f)
          with open('quickhaul/helm/quickhaul/values-dev.yaml', 'r') as f:
              values = yaml.safe_load(f)
              
          for svc in changed:
              key_parts = svc['helm_values_tag_key'].strip('.').split('.')
              # traverse
              current = values
              for k in key_parts:
                  if k in current:
                      current = current[k]
                  else:
                      current = None
                      break
              if current:
                  dev_tag = current
                  print(f"Retagging {svc['image_name']} from {dev_tag} to {VERSION}")
                  cmd = f"az acr import --name resolveopsacr03 --source resolveopsacr03.azurecr.io/{svc['image_name']}:{dev_tag} --image {svc['image_name']}:{VERSION}"
                  subprocess.run(cmd, shell=True, check=True)
          EOF
          python3 retag.py

  update-prod-helm:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [setup, detect-changed-services, calculate-semver, release-prod-images]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
      max-parallel: 1
    uses: Resolveops-AI/resolveops-templates/.github/workflows/helm-updater-template.yml@main
    secrets: inherit
    with:
      values_file: "quickhaul/helm/quickhaul/values-prod.yaml"
      image_tag_key: ${{ matrix.service.helm_values_tag_key }}
      image_tag: ${{ needs.calculate-semver.outputs.new_version }}
      branch_name: "main"
      commit_message: "chore: update ${{ matrix.service.image_name }} prod tag [skip ci]"

  create-git-tag:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [calculate-semver, update-prod-helm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.calculate-semver.outputs.new_version }}

  sync-argo-prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [update-prod-helm]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/cd-reusable-template.yml@main
    secrets: inherit
    with:
      argocd_app_name: quickhaul-prod

  # ==========================================
  # NOTIFICATIONS
  # ==========================================
  notify-detect-changed-services-failed:
    needs: [detect-changed-services]
    if: ${{ always() && needs.detect-changed-services.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "detect-changed-services"

  notify-sast-sonar-scan-failed:
    needs: [sast-sonar-scan]
    if: ${{ always() && needs.sast-sonar-scan.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "sast-sonar-scan"

  notify-sca-snyk-scan-failed:
    needs: [sca-snyk-scan]
    if: ${{ always() && needs.sca-snyk-scan.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "sca-snyk-scan"

  notify-helm-validation-failed:
    needs: [helm-validation]
    if: ${{ always() && needs.helm-validation.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "helm-validation"

  notify-build-dev-images-failed:
    needs: [build-dev-images]
    if: ${{ always() && needs.build-dev-images.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "build-dev-images"

  notify-update-dev-helm-failed:
    needs: [update-dev-helm]
    if: ${{ always() && needs.update-dev-helm.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "update-dev-helm"

  notify-release-prod-images-failed:
    needs: [release-prod-images]
    if: ${{ always() && needs.release-prod-images.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "release-prod-images"

  notify-update-prod-helm-failed:
    needs: [update-prod-helm]
    if: ${{ always() && needs.update-prod-helm.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    secrets: inherit
    with:
      service_name: "QuickHaul CI"
      failed_job_name: "update-prod-helm"
