name: PR Validation

on:
  pull_request:
    branches:
      - feature/dev
      - develop
      - main

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Detect Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v41

      - name: Generate Matrix
        id: set-matrix
        run: |
          SERVICES=$(cat .github/service-map.json)
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"
          
          MATRIX_JSON="[]"
          
          for row in $(echo "${SERVICES}" | jq -r '.[] | @base64'); do
            _jq() {
              echo ${row} | base64 --decode | jq -r ${1}
            }
            CONTEXT_PATH=$(_jq '.context_path')
            
            MATCH=false
            for file in $CHANGED_FILES; do
              if [[ "$file" == "$CONTEXT_PATH"* ]]; then
                MATCH=true
                break
              fi
            done
            
            if [ "$MATCH" = true ]; then
              SERVICE_OBJ=$(echo ${row} | base64 --decode)
              MATRIX_JSON=$(echo "$MATRIX_JSON" | jq -c ". + [$SERVICE_OBJ]")
            fi
          done
          
          echo "matrix={\"include\":$MATRIX_JSON}" >> $GITHUB_OUTPUT

  sast:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sast.yml@main
    with:
      working_directory: ${{ matrix.context_path }}
    secrets: inherit

  sca:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sca.yml@main
    with:
      working_directory: ${{ matrix.context_path }}
    secrets: inherit

  dockerfile-check:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_dockerfile-check.yml@main
    with:
      dockerfile_path: ${{ matrix.dockerfile_path }}
    secrets: inherit

  image-build-and-scan:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_image-build-and-scan.yml@main
    with:
      context_path: ${{ matrix.context_path }}
      dockerfile_path: ${{ matrix.dockerfile_path }}
    secrets: inherit
