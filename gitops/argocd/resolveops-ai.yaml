apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resolveops-ai
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Resolveops-AI/resolveops-application.git
    targetRevision: main
    path: kubernetes/base
    # Image tags in kustomization.yaml are updated by resolveops-ci.yml
    # after each successful build (kustomize edit set image).
    # No overrides needed here — ArgoCD reads the committed kustomization.yaml.
  destination:
    server: https://kubernetes.default.svc
    namespace: resolveops-ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
