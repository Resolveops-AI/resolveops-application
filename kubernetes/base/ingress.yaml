apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: resolveops-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    appgw.ingress.kubernetes.io/health-probe-status-codes: "200-399,404"
spec:
  ingressClassName: azure-application-gateway
  tls:
  - hosts:
    - resolveops.sathvikdevops.site
    secretName: resolveops-tls
  rules:
  - host: resolveops.sathvikdevops.site
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-service
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
