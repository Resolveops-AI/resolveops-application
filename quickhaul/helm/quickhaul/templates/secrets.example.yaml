# ──────────────────────────────────────────────────────────────
# secrets.example.yaml
#
# DO NOT COMMIT REAL SECRETS.
# This file is DOCUMENTATION only — it is NOT applied by Helm.
#
# The backend reads env var `SECRET_KEY` (set via pydantic Settings
# in shared/config.py). This is used for JWT signing.
# MONGO_PASSWORD and REDIS_PASSWORD are only needed if you explicitly
# enable authentication on MongoDB or Redis. For the default in-cluster
# demo deployment they are not required.
#
# Before deploying, create the real secret manually or via your
# secrets manager (Azure Key Vault, Sealed Secrets, ESO, etc.):
#
#   kubectl create secret generic <release>-secrets \
#     --namespace <namespace> \
#     --from-literal=SECRET_KEY='<your-secret-key>'
# ──────────────────────────────────────────────────────────────
# apiVersion: v1
# kind: Secret
# metadata:
#   name: RELEASE_NAME-secrets
#   namespace: NAMESPACE
# type: Opaque
# stringData:
#   SECRET_KEY: "REPLACE_WITH_REAL_VALUE"
#   # MONGO_PASSWORD: "REPLACE_WITH_REAL_VALUE"   # only if MongoDB auth enabled
#   # REDIS_PASSWORD: "REPLACE_WITH_REAL_VALUE"   # only if Redis auth enabled
