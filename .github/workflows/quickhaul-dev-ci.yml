name: QuickHaul Dev CI

on:
  push:
    branches:
      - dev
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-dev-ci.yml'

permissions:
  contents: write
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_services_json: ${{ steps.detect.outputs.changed_services_json }}
      skip_build: ${{ steps.detect.outputs.skip_build }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate Variables
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
      - name: Detect Changed Services
        id: detect
        run: |
          cat << 'EOF' > detect.py
          import yaml, json, subprocess, fnmatch
          with open('.github/service-map/quickhaul-services.yml', 'r') as f:
              service_map = yaml.safe_load(f)
          before = '${{ github.event.before }}'
          sha = '${{ github.sha }}'
          if before and before != '0000000000000000000000000000000000000000':
              cmd = f"git diff --name-only {before} {sha}"
          else:
              cmd = f"git diff --name-only HEAD^ HEAD"
          try:
              output = subprocess.check_output(cmd, shell=True, text=True)
          except subprocess.CalledProcessError:
              output = ""
          changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
          
          docs_only = all(f.endswith('.md') for f in changed_files if f)
          shared_changed = any(f.startswith("quickhaul/backend/shared/") for f in changed_files)
          
          changed_services = []
          if not docs_only:
              for svc, details in service_map.items():
                  if shared_changed and details['context_path'] == "quickhaul/backend":
                      changed_services.append(details)
                      continue
                  changed = False
                  for file in changed_files:
                      for path in details['source_paths']:
                          if fnmatch.fnmatch(file, path):
                              changed = True
                              break
                      if changed:
                          break
                  if changed:
                      changed_services.append(details)
          
          with open('output.json', 'w') as f:
              json.dump(changed_services, f)
          EOF
          python3 -m pip install pyyaml
          python3 detect.py
          JSON_OUT=$(cat output.json)
          if [ "$JSON_OUT" == "[]" ]; then
             echo "skip_build=true" >> $GITHUB_OUTPUT
             echo "changed_services_json=[{\"service_name\":\"dummy\",\"context_path\":\".\",\"dockerfile_path\":\"Dockerfile\",\"image_name\":\"dummy\",\"helm_values_tag_key\":\"dummy\"}]" >> $GITHUB_OUTPUT
          else
             echo "skip_build=false" >> $GITHUB_OUTPUT
             echo "changed_services_json=$JSON_OUT" >> $GITHUB_OUTPUT
          fi

  lint-testing:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running generic linting for changed services"

  sonar-scan:
    name: SonarQube Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, lint-testing]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: true
      run_snyk: false
      run_trivy: false

  snyk-scan:
    name: Snyk Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, sonar-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: false
      run_snyk: true
      run_trivy: false

  build-trivy-push:
    name: Build & Push Dev (${{ matrix.service.image_name }})
    needs: [detect-changed-services, snyk-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: dev-${{ needs.detect-changed-services.outputs.short_sha }}
      push_image: true

  update-dev-helm-values:
    needs: [detect-changed-services, build-trivy-push]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
      - name: Update values-dev.yaml
        run: |
          echo '${{ needs.detect-changed-services.outputs.changed_services_json }}' > changed.json
          DEV_TAG="dev-${{ needs.detect-changed-services.outputs.short_sha }}"
          
          for row in $(jq -c '.[]' changed.json); do
            KEY=$(echo $row | jq -r '.helm_values_tag_key')
            yq e "${KEY} = \"${DEV_TAG}\"" -i quickhaul/helm/quickhaul/values-dev.yaml
          done
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add quickhaul/helm/quickhaul/values-dev.yaml
          git commit -m "chore: update quickhaul dev image tags [skip ci]" || echo "No changes to commit"
          git push origin dev

  sync-argo-dev:
    needs: [update-dev-helm-values]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/cd-reusable-template.yml@main
    secrets: inherit
    with:
      argocd_app_name: quickhaul-dev
      argocd_server: ${{ vars.ARGOCD_SERVER }}
