name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: 'frontend', path: 'frontend', type: 'node' }
          - { name: 'api-gateway-service', path: 'services/api-gateway-service', type: 'python' }
          - { name: 'auth-service', path: 'services/auth-service', type: 'python' }
          - { name: 'github-intelligence-service', path: 'services/github-intelligence-service', type: 'python' }
          - { name: 'azure-intelligence-service', path: 'services/azure-intelligence-service', type: 'python' }
          - { name: 'aws-intelligence-service', path: 'services/aws-intelligence-service', type: 'python' }
          - { name: 'ai-rca-service', path: 'services/ai-rca-service', type: 'python' }
          - { name: 'notification-service', path: 'services/notification-service', type: 'python' }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Security Scans
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Snyk Security Scan
        uses: snyk/actions/setup@master
        with:
          snyk-version: latest
      - name: Run Snyk test
        run: |
          cd ${{ matrix.service.path }}
          snyk test --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}
          cd ${{ matrix.service.path }}
          docker build -t ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }} .
          docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --name ${{ vars.AKS_CLUSTER_NAME }}

      - name: Deploy to AKS
        run: |
          cd kubernetes
          # Update Kustomize image tags
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/frontend:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/api-gateway-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/auth-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/github-intelligence-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/azure-intelligence-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/aws-intelligence-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/ai-rca-service:${{ github.sha }}
          kustomize edit set image ${{ vars.ACR_LOGIN_SERVER }}/notification-service:${{ github.sha }}
          
          # Deploy
          kubectl apply -k .

      - name: Wait for Rollout Status
        run: |
          kubectl rollout status deployment/frontend -n resolveops-dev
          kubectl rollout status deployment/api-gateway-service -n resolveops-dev
          # Add remaining services here

      - name: Print Resources
        run: |
          kubectl get pods -n resolveops-dev
          kubectl get svc -n resolveops-dev
          kubectl get ingress -n resolveops-dev

      - name: Smoke Test
        run: |
          # Example smoke test against the internal cluster IP if accessible, or public ingress
          # Assuming ingress is setup, wait a few seconds
          sleep 10
          # We check the internal health endpoint via port-forward for reliability in CI
          kubectl port-forward svc/api-gateway-service 8000:8000 -n resolveops-dev &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
