name: QuickHaul PR Validation

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-pr-validation.yml'

permissions:
  contents: read
  pull-requests: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_services_json: ${{ steps.detect.outputs.changed_services_json }}
      skip_build: ${{ steps.detect.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Changed Services
        id: detect
        run: |
          cat << 'EOF' > detect.py
          import yaml, json, subprocess, fnmatch
          with open('.github/service-map/quickhaul-services.yml', 'r') as f:
              service_map = yaml.safe_load(f)
          base_sha = '${{ github.event.pull_request.base.sha }}'
          head_sha = '${{ github.event.pull_request.head.sha }}'
          cmd = f"git diff --name-only {base_sha} {head_sha}"
          try:
              output = subprocess.check_output(cmd, shell=True, text=True)
          except subprocess.CalledProcessError:
              output = ""
          changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
          
          docs_only = all(f.endswith('.md') for f in changed_files if f)
          shared_changed = any(f.startswith("quickhaul/backend/shared/") for f in changed_files)
          
          changed_services = []
          if not docs_only:
              for svc, details in service_map.items():
                  if shared_changed and details['context_path'] == "quickhaul/backend":
                      changed_services.append(details)
                      continue
                  changed = False
                  for file in changed_files:
                      for path in details['source_paths']:
                          if fnmatch.fnmatch(file, path):
                              changed = True
                              break
                      if changed:
                          break
                  if changed:
                      changed_services.append(details)
          
          with open('output.json', 'w') as f:
              json.dump(changed_services, f)
          EOF
          python3 -m pip install pyyaml
          python3 detect.py
          JSON_OUT=$(cat output.json)
          if [ "$JSON_OUT" == "[]" ]; then
             echo "skip_build=true" >> $GITHUB_OUTPUT
             echo "changed_services_json=[{\"service_name\":\"dummy\",\"context_path\":\".\",\"dockerfile_path\":\"Dockerfile\",\"image_name\":\"dummy\",\"helm_values_tag_key\":\"dummy\"}]" >> $GITHUB_OUTPUT
          else
             echo "skip_build=false" >> $GITHUB_OUTPUT
             echo "changed_services_json=$JSON_OUT" >> $GITHUB_OUTPUT
          fi

  lint-testing:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running generic linting for changed services"

  sonar-scan:
    name: SonarQube Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, lint-testing]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: true
      run_snyk: false
      run_trivy: false

  snyk-scan:
    name: Snyk Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, sonar-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: false
      run_snyk: true
      run_trivy: false

  temp-docker-build-trivy:
    name: Build & Trivy Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, snyk-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: pr-${{ github.event.pull_request.number }}-${{ github.sha }}
      push_image: false
