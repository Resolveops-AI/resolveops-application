{{- $root := . -}}

{{- if .Values.frontend.enabled -}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "quickhaul.fullname" . }}-frontend-hpa
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quickhaul.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "quickhaul.fullname" . }}-frontend
  minReplicas: {{ .Values.frontend.replicaCount }}
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
{{- end }}

{{- $services := list
  (dict "key" "locationService"     "component" "location-service")
  (dict "key" "authService"         "component" "auth-service")
  (dict "key" "bookingService"      "component" "booking-service")
  (dict "key" "notificationService" "component" "notification-service")
  (dict "key" "otpService"          "component" "otp-service")
  (dict "key" "paymentService"      "component" "payment-service")
-}}

{{- range $svc := $services -}}
{{- $vals := index $root.Values $svc.key -}}
{{- if $vals.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "quickhaul.fullname" $root }}-{{ $svc.component }}-hpa
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "quickhaul.labels" $root | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "quickhaul.fullname" $root }}-{{ $svc.component }}
  minReplicas: {{ $vals.replicaCount }}
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
{{- end }}
{{- end }}
