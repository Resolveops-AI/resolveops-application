apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  
spec:
  podSelector:
    matchLabels:
      app: frontend
  ingress:
  - ports:
    - protocol: TCP
      port: 3000
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api-gateway
  
spec:
  podSelector:
    matchLabels:
      app: api-gateway-service
  ingress:
  - ports:
    - protocol: TCP
      port: 8000
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-backends
  
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - auth-service
      - github-intelligence-service
      - azure-intelligence-service
      - aws-intelligence-service
      - ai-rca-service
      - notification-service
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway-service
    ports:
    - protocol: TCP
      port: 8000
  policyTypes:
  - Ingress
