name: Delete old workflow runs

on:
  workflow_dispatch:
    inputs:
      retain_days:
        description: 'Days to retain runs'
        required: true
        default: '0'
      keep_minimum_runs:
        description: 'Minimum runs to keep per workflow'
        required: true
        default: '0'

jobs:
  del_runs:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: ${{ github.event.inputs.retain_days }}
          keep_minimum_runs: ${{ github.event.inputs.keep_minimum_runs }}
