name: Prod Deployment

on:
  workflow_dispatch:
    inputs:
      service_name:
        description: 'Service to deploy (or "all")'
        required: true
        type: string
        default: 'all'
      image_tag:
        description: 'Semantic Version (e.g. v1.0.0)'
        required: true
        type: string
      source_ref:
        description: 'Source ref to deploy (main, commit SHA, or tag)'
        required: true
        type: string
        default: 'main'

permissions:
  id-token: write
  contents: write

jobs:
  validate-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Validate Tag
        run: |
          if [[ ! "${{ github.event.inputs.image_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
            echo "Error: image_tag must be semver (e.g. v1.0.0)"
            exit 1
          fi

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_ref }}

      - name: Generate Matrix
        id: set-matrix
        run: |
          SERVICES=$(cat .github/service-map.json)
          TARGET_SERVICE="${{ github.event.inputs.service_name }}"
          
          MATRIX_JSON="[]"
          
          for row in $(echo "${SERVICES}" | jq -r '.[] | @base64'); do
            _jq() {
              echo ${row} | base64 --decode | jq -r ${1}
            }
            SVC_NAME=$(_jq '.service_name')
            
            if [ "$TARGET_SERVICE" == "all" ] || [ "$TARGET_SERVICE" == "$SVC_NAME" ]; then
              SERVICE_OBJ=$(echo ${row} | base64 --decode)
              MATRIX_JSON=$(echo "$MATRIX_JSON" | jq -c ". + [$SERVICE_OBJ]")
            fi
          done
          
          if [ "$MATRIX_JSON" == "[]" ]; then
            echo "Error: No matching service found for '$TARGET_SERVICE'"
            exit 1
          fi
          
          echo "matrix={\"include\":$MATRIX_JSON}" >> $GITHUB_OUTPUT

  sast:
    needs: validate-and-prepare
    if: ${{ needs.validate-and-prepare.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sast.yml@main
    with:
      working_directory: ${{ matrix.context_path }}
    secrets: inherit

  sca:
    needs: validate-and-prepare
    if: ${{ needs.validate-and-prepare.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sca.yml@main
    with:
      working_directory: ${{ matrix.context_path }}
    secrets: inherit

  dockerfile-check:
    needs: validate-and-prepare
    if: ${{ needs.validate-and-prepare.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_dockerfile-check.yml@main
    with:
      dockerfile_path: ${{ matrix.dockerfile_path }}
    secrets: inherit

  image-build-and-scan:
    needs: validate-and-prepare
    if: ${{ needs.validate-and-prepare.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_image-build-and-scan.yml@main
    with:
      context_path: ${{ matrix.context_path }}
      dockerfile_path: ${{ matrix.dockerfile_path }}
    secrets: inherit

  publish:
    needs: [validate-and-prepare, sast, sca, dockerfile-check, image-build-and-scan]
    if: ${{ needs.validate-and-prepare.outputs.matrix != '{"include":[]}' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-docker-build-push.yml@main
    with:
      image_name: ${{ matrix.image_name }}
      context_path: ${{ matrix.context_path }}
      dockerfile_path: ${{ matrix.dockerfile_path }}
      image_tag: ${{ github.event.inputs.image_tag }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
    secrets: inherit

  deploy:
    needs: [validate-and-prepare, publish]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJson(needs.validate-and-prepare.outputs.matrix) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-gitops-update.yml@main
    with:
      image_name: ${{ matrix.image_name }}
      image_tag: ${{ github.event.inputs.image_tag }}
      manifest_type: ${{ matrix.gitops_type }}
      values_file: ${{ matrix.helm_values_file != null && format('{0}/values-prod.yaml', matrix.helm_values_file) || '' }}
      image_tag_key: ${{ matrix.image_tag_key || '' }}
      kustomize_dir: ${{ matrix.kustomize_dir || '' }}
      target_branch: main
    secrets: inherit

  notify-on-failure:
    needs: [validate-and-prepare, sast, sca, dockerfile-check, image-build-and-scan, publish, deploy]
    if: always() && contains(needs.*.result, 'failure')
    uses: Resolveops-AI/resolveops-templates/.github/workflows/reusable-notify.yml@main
    with:
      status: failure
      message: "CI/CD Pipeline failed for one or more services in prod."
    secrets: inherit
