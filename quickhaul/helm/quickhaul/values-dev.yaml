# ──────────────────────────────────────────────────────────────
# values-dev.yaml — QuickHaul DEV overrides
# Target namespace: quickhaul-dev
# Low-cost, single replica, no ingress TLS, small resources
# ──────────────────────────────────────────────────────────────

config:
  mongoUri: "mongodb://quickhaul-mongodb:27017"
  redisUrl: "redis://quickhaul-redis:6379/0"
  frontendUrl: "http://quickhaul.sathvikdevops.site"

mongodb:
  persistence:
    enabled: true
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

redis:
  persistence:
    enabled: false

frontend:
  replicaCount: 1

locationService:
  replicaCount: 1

authService:
  replicaCount: 1

bookingService:
  replicaCount: 1

notificationService:
  replicaCount: 1

otpService:
  replicaCount: 1

paymentService:
  replicaCount: 1

ingress:
  enabled: false

gatewayAPI:
  enabled: true
  host: "quickhaul.sathvikdevops.site"
