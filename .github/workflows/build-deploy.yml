name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  WORKLOAD_IDENTITY_CLIENT_ID: ${{ vars.WORKLOAD_IDENTITY_CLIENT_ID }}
  KEY_VAULT_NAME: ${{ vars.KEY_VAULT_NAME }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AKS_NAMESPACE: resolveops-dev
  GITHUB_SHA: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: 'frontend', path: 'frontend', type: 'node' }
          - { name: 'api-gateway-service', path: 'services/api-gateway-service', type: 'python' }
          - { name: 'auth-service', path: 'services/auth-service', type: 'python' }
          - { name: 'github-intelligence-service', path: 'services/github-intelligence-service', type: 'python' }
          - { name: 'azure-intelligence-service', path: 'services/azure-intelligence-service', type: 'python' }
          - { name: 'aws-intelligence-service', path: 'services/aws-intelligence-service', type: 'python' }
          - { name: 'ai-rca-service', path: 'services/ai-rca-service', type: 'python' }
          - { name: 'notification-service', path: 'services/notification-service', type: 'python' }
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Security Scans
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Snyk Security Scan
        uses: snyk/actions/setup@master
        with:
          snyk-version: latest
      - name: Run Snyk test
        run: |
          cd ${{ matrix.service.path }}
          snyk test --all-projects
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker Image
        run: |
          cd ${{ matrix.service.path }}
          docker build -t ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }} .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}
          docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }}
          # Also tag as dev and push
          docker tag ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:${{ github.sha }} ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:dev
          docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ matrix.service.name }}:dev

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS Credentials
        run: az aks get-credentials --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} --name ${{ vars.AKS_CLUSTER_NAME }}

      - name: Install gettext-base for envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Render and Deploy to AKS
        run: |
          cd kubernetes
          kubectl kustomize overlays/dev | envsubst > rendered.yaml
          kubectl apply -f rendered.yaml

      - name: Wait for Rollout Status
        run: |
          kubectl rollout status deployment/frontend -n resolveops-dev
          kubectl rollout status deployment/api-gateway-service -n resolveops-dev
          kubectl rollout status deployment/auth-service -n resolveops-dev
          kubectl rollout status deployment/azure-intelligence-service -n resolveops-dev
          kubectl rollout status deployment/ai-rca-service -n resolveops-dev
          kubectl rollout status deployment/github-intelligence-service -n resolveops-dev
          kubectl rollout status deployment/aws-intelligence-service -n resolveops-dev
          kubectl rollout status deployment/notification-service -n resolveops-dev

      - name: Print Resources
        run: |
          kubectl get pods -n resolveops-dev
          kubectl get svc -n resolveops-dev
          kubectl get ingress -n resolveops-dev

      - name: Smoke Test
        run: |
          sleep 10
          kubectl port-forward svc/api-gateway-service 8000:8000 -n resolveops-dev &
          sleep 5
          curl -f http://localhost:8000/health || exit 1
