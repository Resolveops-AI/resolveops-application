{{- if and .Values.mongodb.enabled .Values.mongodb.persistence.enabled -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: quickhaul-mongodb-data
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
    {{- include "quickhaul.labels" . | nindent 4 }}
    app.kubernetes.io/component: mongodb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mongodb.persistence.size }}
  {{- if .Values.mongodb.persistence.storageClassName }}
  storageClassName: {{ .Values.mongodb.persistence.storageClassName | quote }}
  {{- end }}
{{- end }}
