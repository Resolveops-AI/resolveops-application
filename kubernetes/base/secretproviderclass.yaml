apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kvname-workload-identity
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${WORKLOAD_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    cloudName: ""
    objects:  |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: smtp-user
          objectType: secret
          objectVersion: ""
        - |
          objectName: smtp-password
          objectType: secret
          objectVersion: ""
        - |
          objectName: ai-provider-api-key
          objectType: secret
          objectVersion: ""
        - |
          objectName: github-webhook-secret
          objectType: secret
          objectVersion: ""
    tenantId: "${AZURE_TENANT_ID}"
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kvname-workload-identity-db
spec:
  provider: azure
  secretObjects:
  - secretName: resolveops-secrets
    type: Opaque
    data:
    - objectName: database-url
      key: DATABASE_URL
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "${WORKLOAD_IDENTITY_CLIENT_ID}"
    keyvaultName: "${KEY_VAULT_NAME}"
    cloudName: ""
    objects:  |
      array:
        - |
          objectName: jwt-secret
          objectType: secret
          objectVersion: ""
        - |
          objectName: database-url
          objectType: secret
          objectVersion: ""
    tenantId: "${AZURE_TENANT_ID}"