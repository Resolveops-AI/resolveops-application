{{- if .Values.redis.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: quickhaul-redis
  labels:
    {{- include "quickhaul.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: {{ .Values.redis.port | default 6379 }}
      targetPort: {{ .Values.redis.port | default 6379 }}
      protocol: TCP
  selector:
    app: quickhaul-redis
{{- end }}
