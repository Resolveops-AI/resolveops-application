name: QuickHaul CI

on:
  push:
    branches:
      - dev
      - main
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci.yml'

permissions:
  contents: write
  id-token: write
  pull-requests: read

env:
  ACR_NAME: resolveopsacr03
  ACR_LOGIN_SERVER: resolveopsacr03.azurecr.io
  AZURE_RESOURCE_GROUP: sathvik-rg
  AKS_CLUSTER_NAME: resolveops-aks-02
  RESOLVEOPS_NAMESPACE: resolveops-ai
  QUICKHAUL_DEV_NAMESPACE: quickhaul-dev
  QUICKHAUL_PROD_NAMESPACE: quickhaul-prod

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      dev_image_tag: ${{ steps.vars.outputs.dev_image_tag }}
      candidate_tag: ${{ steps.vars.outputs.candidate_tag }}
    steps:
      - name: Calculate Variables
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "dev_image_tag=dev-pr-${{ github.event.pull_request.number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "candidate_tag=main-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

  lint-testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontend Lint and Test
        run: |
          cd quickhaul/frontend
          if [ -f "package.json" ]; then
            npm ci || echo "Warning: npm ci failed"
            if grep -q '"lint"' package.json; then
              npm run lint || echo "Warning: Lint failed"
            else
              echo "Warning: No lint script found in package.json"
            fi
            if grep -q '"test"' package.json; then
              npm test || echo "Warning: Test failed"
            else
              echo "Warning: No test script found in package.json"
            fi
          fi
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Backend Lint and Test
        run: |
          cd quickhaul/backend
          pip install pytest || true
          if [ -d "tests" ] || [ -d "test" ] || ls test_*.py 1> /dev/null 2>&1 || find . -name "test_*.py" | grep -q .; then
            pytest || echo "Warning: pytest failed"
          else
            echo "Warning: No python tests found"
          fi

  sast-snyk-scan:
    needs: [lint-testing]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: .

  helm-validation:
    needs: [lint-testing]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Helm Lint
        run: helm lint quickhaul/helm/quickhaul
      - name: Helm Template Dev
        run: helm template quickhaul-dev quickhaul/helm/quickhaul -n quickhaul-dev -f quickhaul/helm/quickhaul/values-dev.yaml
      - name: Helm Template Prod
        run: helm template quickhaul-prod quickhaul/helm/quickhaul -n quickhaul-prod -f quickhaul/helm/quickhaul/values-prod.yaml

  # ==========================================
  # PR FLOW (DEV IMAGES)
  # ==========================================
  build-dev-images:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, sast-snyk-scan, helm-validation]
    strategy:
      matrix:
        service: [frontend, location, auth, booking, notification, otp, payment]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: quickhaul-${{ matrix.service }}
      context_path: ${{ matrix.service == 'frontend' && './quickhaul/frontend' || './quickhaul/backend' }}
      dockerfile_path: ${{ matrix.service == 'frontend' && './quickhaul/frontend/Dockerfile' || './quickhaul/backend/Dockerfile' }}
      acr_name: resolveopsacr03
      acr_login_server: resolveopsacr03.azurecr.io
      image_tag: ${{ needs.setup.outputs.dev_image_tag }}

  update-values-dev-yaml:
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    needs: [setup, build-dev-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Update values-dev.yaml tags
        run: |
          NEW_TAG="${{ needs.setup.outputs.dev_image_tag }}"
          sed -i "s/tag: .*/tag: $NEW_TAG/g" quickhaul/helm/quickhaul/values-dev.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add quickhaul/helm/quickhaul/values-dev.yaml
          git commit -m "chore: update quickhaul dev image tag [skip ci]" || echo "No changes to commit"
          git push origin ${{ github.head_ref }}

  # ==========================================
  # MAIN FLOW (PROD IMAGES)
  # ==========================================
  calculate-semver:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [sast-snyk-scan, helm-validation]
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate Next Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          release_branches: main

  build-prod-candidate-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [setup, calculate-semver]
    strategy:
      matrix:
        service: [frontend, location, auth, booking, notification, otp, payment]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: quickhaul-${{ matrix.service }}
      context_path: ${{ matrix.service == 'frontend' && './quickhaul/frontend' || './quickhaul/backend' }}
      dockerfile_path: ${{ matrix.service == 'frontend' && './quickhaul/frontend/Dockerfile' || './quickhaul/backend/Dockerfile' }}
      acr_name: resolveopsacr03
      acr_login_server: resolveopsacr03.azurecr.io
      image_tag: ${{ needs.setup.outputs.candidate_tag }}

  verify-tag-not-exists:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [calculate-semver, build-prod-candidate-images]
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Check ACR for Tag
        run: |
          TAG="${{ needs.calculate-semver.outputs.new_version }}"
          EXISTS=$(az acr repository show-tags -n resolveopsacr03 --repository quickhaul-frontend --query "[?@ == '$TAG']" -o tsv)
          if [ -n "$EXISTS" ]; then
            echo "Error: Tag $TAG already exists in ACR!"
            exit 1
          fi

  prod-approval-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [verify-tag-not-exists]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production environment approved!"

  retag-and-push-prod-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [setup, calculate-semver, prod-approval-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Retag and Push Images
        run: |
          CANDIDATE="${{ needs.setup.outputs.candidate_tag }}"
          VERSION="${{ needs.calculate-semver.outputs.new_version }}"
          SERVICES=("frontend" "location" "auth" "booking" "notification" "otp" "payment")
          
          for SERVICE in "${SERVICES[@]}"; do
            echo "Retagging quickhaul-$SERVICE from $CANDIDATE to $VERSION..."
            az acr import --name resolveopsacr03 \
              --source resolveopsacr03.azurecr.io/quickhaul-$SERVICE:$CANDIDATE \
              --image quickhaul-$SERVICE:$VERSION
          done

  update-values-prod-yaml:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [calculate-semver, retag-and-push-prod-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update values-prod.yaml
        run: |
          VERSION="${{ needs.calculate-semver.outputs.new_version }}"
          sed -i "s/tag: .*/tag: $VERSION/g" quickhaul/helm/quickhaul/values-prod.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add quickhaul/helm/quickhaul/values-prod.yaml
          git commit -m "chore: release quickhaul $VERSION [skip ci]" || echo "No changes to commit"
          git push origin main
      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.calculate-semver.outputs.new_version }}

  # ==========================================
  # NOTIFICATIONS
  # ==========================================
  notify-lint-testing-failed:
    needs: [lint-testing]
    if: ${{ always() && needs.lint-testing.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "lint-testing"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-sast-snyk-scan-failed:
    needs: [sast-snyk-scan]
    if: ${{ always() && needs.sast-snyk-scan.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "sast-snyk-scan"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-helm-validation-failed:
    needs: [helm-validation]
    if: ${{ always() && needs.helm-validation.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "helm-validation"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-build-dev-images-failed:
    needs: [build-dev-images]
    if: ${{ always() && needs.build-dev-images.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "build-dev-images"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-update-values-dev-failed:
    needs: [update-values-dev-yaml]
    if: ${{ always() && needs.update-values-dev-yaml.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "update-values-dev-yaml"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-calculate-semver-failed:
    needs: [calculate-semver]
    if: ${{ always() && needs.calculate-semver.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "calculate-semver"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-build-prod-candidate-failed:
    needs: [build-prod-candidate-images]
    if: ${{ always() && needs.build-prod-candidate-images.result == 'failure' }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "build-prod-candidate-images"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit

  notify-release-prod-failed:
    needs: [retag-and-push-prod-images, update-values-prod-yaml]
    if: ${{ always() && (needs.retag-and-push-prod-images.result == 'failure' || needs.update-values-prod-yaml.result == 'failure') }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/notify-template.yml@main
    with:
      service_name: "QuickHaul"
      environment: "CI/CD"
      failed_job_name: "release-prod"
      status: "Failure"
      run_url: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      branch_name: "${{ github.ref_name }}"
      commit_sha: "${{ github.sha }}"
      actor: "${{ github.actor }}"
      workflow_name: "${{ github.workflow }}"
    secrets: inherit
