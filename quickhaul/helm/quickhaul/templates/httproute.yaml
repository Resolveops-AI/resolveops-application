{{- if .Values.gatewayAPI.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "quickhaul.fullname" . }}-route
  labels:
    {{- include "quickhaul.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ include "quickhaul.fullname" . }}-gateway
  hostnames:
  - {{ .Values.gatewayAPI.host | quote }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/locations
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-location-service
      port: 8001
  - matches:
    - path:
        type: PathPrefix
        value: /api/auth
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-auth-service
      port: 8002
  - matches:
    - path:
        type: PathPrefix
        value: /api/bookings
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-booking-service
      port: 8003
  - matches:
    - path:
        type: PathPrefix
        value: /api/notifications
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-notification-service
      port: 8004
  - matches:
    - path:
        type: PathPrefix
        value: /api/otp
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-otp-service
      port: 8005
  - matches:
    - path:
        type: PathPrefix
        value: /api/payments
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-payment-service
      port: 8006
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: {{ include "quickhaul.fullname" . }}-frontend
      port: 80
{{- end }}
