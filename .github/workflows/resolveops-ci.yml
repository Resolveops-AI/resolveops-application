name: ResolveOps AI CI

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/resolveops-ci.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/resolveops-ci.yml'

permissions:
  id-token: write
  contents: write
  pull-requests: read

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  AZURE_RESOURCE_GROUP: sathvik-rg

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      dev_image_tag: ${{ steps.vars.outputs.dev_image_tag }}
    steps:
      - name: Calculate Variables
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "dev_image_tag=resolveops-pr-${{ github.event.pull_request.number }}-$SHORT_SHA" >> $GITHUB_OUTPUT
          else
            echo "dev_image_tag=dev-$SHORT_SHA" >> $GITHUB_OUTPUT
          fi

  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_services_json: ${{ steps.detect.outputs.changed_services_json }}
      skip_build: ${{ steps.detect.outputs.skip_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect Changed Services
        id: detect
        run: |
          cat << 'EOF' > detect.py
          import yaml, json, subprocess, fnmatch
          with open('.github/service-map/resolveops-services.yml', 'r') as f:
              service_map = yaml.safe_load(f)
          event_name = '${{ github.event_name }}'
          if event_name == 'pull_request':
              base_sha = '${{ github.event.pull_request.base.sha }}'
              head_sha = '${{ github.event.pull_request.head.sha }}'
              cmd = f"git diff --name-only {base_sha} {head_sha}"
          else:
              before = '${{ github.event.before }}'
              sha = '${{ github.sha }}'
              if before and before != '0000000000000000000000000000000000000000':
                  cmd = f"git diff --name-only {before} {sha}"
              else:
                  cmd = f"git diff --name-only HEAD^ HEAD"
          try:
              output = subprocess.check_output(cmd, shell=True, text=True)
          except subprocess.CalledProcessError:
              output = ""
          changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
          
          docs_only = all(f.endswith('.md') for f in changed_files if f)
          
          changed_services = []
          if not docs_only:
              for svc, details in service_map.items():
                  changed = False
                  for file in changed_files:
                      for path in details['source_paths']:
                          if fnmatch.fnmatch(file, path):
                              changed = True
                              break
                      if changed:
                          break
                  if changed:
                      changed_services.append(details)
          
          with open('output.json', 'w') as f:
              json.dump(changed_services, f)
          EOF
          python3 -m pip install pyyaml
          python3 detect.py
          JSON_OUT=$(cat output.json)
          if [ "$JSON_OUT" == "[]" ]; then
             echo "skip_build=true" >> $GITHUB_OUTPUT
             echo "changed_services_json=[{\"service_name\":\"dummy\",\"context_path\":\".\",\"dockerfile_path\":\"Dockerfile\",\"image_name\":\"dummy\",\"helm_values_tag_key\":\"dummy\"}]" >> $GITHUB_OUTPUT
          else
             echo "skip_build=false" >> $GITHUB_OUTPUT
             echo "changed_services_json=$JSON_OUT" >> $GITHUB_OUTPUT
          fi

  lint-testing:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running generic linting for changed services"

  sast-sonar-scan:
    name: sast / SonarQube Analysis (${{ matrix.service.image_name }})
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: true
      run_snyk: false
      run_trivy: false

  sca-snyk-scan:
    name: sca / Snyk Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, sast-sonar-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: false
      run_snyk: true
      run_trivy: false

  # ==========================================
  # PR FLOW ONLY (NO PUSH)
  # ==========================================
  build-temp-images:
    name: trivy / Build & Scan Image (${{ matrix.service.image_name }})
    if: github.event_name == \'pull_request\'
    needs: [setup, detect-changed-services, lint-testing, sca-snyk-scan]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Temporary Docker Image
        run: |
          docker build -t temp-image:${{ needs.setup.outputs.dev_image_tag }} -f ${{ matrix.service.dockerfile_path }} ${{ matrix.service.context_path }}
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "temp-image:${{ needs.setup.outputs.dev_image_tag }}"
          format: "table"
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

  pr-quality-gate:
    name: PR Quality Gate
    if: github.event_name == 'pull_request'
    needs: [build-temp-images]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All PR checks passed successfully!"

  # ==========================================
  # DEV FLOW (PUSH TO DEV)
  # ==========================================
  build-dev-images:
    name: dev-publish / Build & Push Image (${{ matrix.service.image_name }})
    if: github.event_name == \'push\' && github.ref == \'refs/heads/dev\'
    needs: [setup, detect-changed-services, lint-testing, sca-snyk-scan]
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: ${{ needs.setup.outputs.dev_image_tag }}

  # Note: ResolveOps does not update QuickHaul Helm values or auto-deploy to AKS here

  # ==========================================
  # MAIN FLOW (PROD IMAGES)
  # ==========================================
  calculate-semver:
    if: github.event_name == \'push\' && github.ref == \'refs/heads/main\'
    needs: [detect-changed-services, lint-testing, sca-snyk-scan]
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semver.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate Next Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          dry_run: true
          default_bump: patch
          release_branches: main

  validate-prod-candidates:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [detect-changed-services, calculate-semver]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}
      - name: Pull Dev Images and Run Trivy
        run: |
          VERSION="${{ needs.calculate-semver.outputs.new_version }}"
          echo '${{ needs.detect-changed-services.outputs.changed_services_json }}' > changed.json
          
          for row in $(jq -c '.[]' changed.json); do
            IMAGE_NAME=$(echo $row | jq -r '.image_name')
            
            # Since ResolveOps doesn't have dev tags in values-dev.yaml to read from,
            # we must infer the latest dev tag from ACR, or from the commit history.
            # Assuming ResolveOps dev images are tagged with dev-<short-sha>.
            # We'll use az acr repository show-tags to get the latest dev- tag.
            DEV_TAG=$(az acr repository show-tags -n ${{ env.ACR_NAME }} --repository $IMAGE_NAME --query "[?starts_with(@, 'dev-')] | sort(@) | [-1]" -o tsv)
            
            if [ -z "$DEV_TAG" ]; then
              echo "Error: Could not find dev tag for $IMAGE_NAME in ACR!"
              exit 1
            fi
            
            echo "Pulling $IMAGE_NAME:$DEV_TAG"
            docker pull ${{ env.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$DEV_TAG
            
            echo "Running Trivy on $IMAGE_NAME:$DEV_TAG"
            docker run --rm -v /var/run/docker.sock:/var/run/docker.sock aquasec/trivy image \
              --exit-code 0 --severity CRITICAL,HIGH ${{ env.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$DEV_TAG
              
            EXISTS=$(az acr repository show-tags -n ${{ env.ACR_NAME }} --repository $IMAGE_NAME --query "[?@ == '${VERSION}']" -o tsv)
            if [ -n "$EXISTS" ]; then
              echo "Error: Tag $VERSION already exists in ACR for $IMAGE_NAME!"
              exit 1
            fi
            
            # Save the DEV_TAG mapping for the next job
            echo "$IMAGE_NAME=$DEV_TAG" >> dev_tags.env
          done
      - name: Upload dev tags mapping
        uses: actions/upload-artifact@v4
        with:
          name: dev_tags
          path: dev_tags.env

  prod-approval-gate:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [validate-prod-candidates]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - run: echo "Production environment approved!"

  release-prod-images:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [detect-changed-services, calculate-semver, prod-approval-gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Download dev tags mapping
        uses: actions/download-artifact@v4
        with:
          name: dev_tags
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Retag and Push Semantic Version
        run: |
          VERSION="${{ needs.calculate-semver.outputs.new_version }}"
          echo '${{ needs.detect-changed-services.outputs.changed_services_json }}' > changed.json
          
          for row in $(jq -c '.[]' changed.json); do
            IMAGE_NAME=$(echo $row | jq -r '.image_name')
            DEV_TAG=$(grep "^${IMAGE_NAME}=" dev_tags.env | cut -d'=' -f2)
            
            echo "Retagging $IMAGE_NAME from $DEV_TAG to $VERSION"
            az acr import --name ${{ env.ACR_NAME }} \
              --source ${{ env.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$DEV_TAG \
              --image $IMAGE_NAME:$VERSION
          done
      - name: Create Git Tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_tag: ${{ needs.calculate-semver.outputs.new_version }}

