name: CI/CD - resolveops-frontend

on:
  workflow_dispatch:
permissions:
  contents: write
  id-token: write

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}
      environment: ${{ steps.tag.outputs.ENV }}
    steps:
      - id: tag
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ "${{ github.ref_name }}" != "main" ]; then
              echo "Error: Releases can only be triggered from the main branch."
              exit 1
            fi
            if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-.*)?$ ]]; then
              echo "Error: version must be semver (e.g. v1.0.0)"
              exit 1
            fi
            echo "TAG=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "ENV=main" >> $GITHUB_OUTPUT
          else
            echo "TAG=dev-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
            echo "ENV=feature/dev" >> $GITHUB_OUTPUT
          fi

  sast:
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sast.yml@main
    with:
      working_directory: frontend
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  sca:
    needs: [sast, get-tag]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_sca.yml@main
    with:
      working_directory: frontend
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    needs: [sast, sca, get-tag]
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_docker-build.yml@main
    with:
      image_name: resolveops-frontend
      context_path: frontend
      dockerfile_path: frontend/Dockerfile

  publish:
    needs: [sast, sca, get-tag]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_docker-publish.yml@main
    with:
      image_name: resolveops-frontend
      context_path: frontend
      dockerfile_path: frontend/Dockerfile
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      image_tag: ${{ needs.get-tag.outputs.image_tag }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  cd:
    needs: [publish, get-tag]
    if: always() && needs.publish.result == 'success' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    uses: Resolveops-AI/resolveops-templates/.github/workflows/_cd-template.yml@main
    with:
      service-name: resolveops-frontend
      image-tag: ${{ needs.get-tag.outputs.image_tag }}
      environment: ${{ needs.get-tag.outputs.environment }}
      manifest_type: kustomize
      target_dir: kubernetes/base
      update_key: ${{ vars.ACR_LOGIN_SERVER }}/frontend
    secrets:
      HELM_REPO_PAT: ${{ secrets.HELM_REPO_PAT }}
