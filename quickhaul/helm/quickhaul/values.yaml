# ──────────────────────────────────────────────────────────────
# QuickHaul Transits — default (base) values
# Override with values-dev.yaml or values-prod.yaml
# ──────────────────────────────────────────────────────────────

# ── Global ────────────────────────────────────────────────────
global:
  imageRegistry: ""   # e.g. myacr.azurecr.io — prefix applied to all images when set
  imagePullSecrets: []

namespaceOverride: ""

# ── MongoDB ───────────────────────────────────────────────────
mongodb:
  enabled: true
  image:
    repository: mongo
    tag: "7.0"
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    port: 27017
  auth:
    enabled: true
    username: quickhaul
    password: change-me
    database: quickhaul
    existingSecret: ""
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# ── Redis ─────────────────────────────────────────────────────
redis:
  enabled: true
  image:
    repository: redis
    tag: "7.2-alpine"
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 6379
  persistence:
    enabled: false
    size: 1Gi
    storageClass: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Frontend ──────────────────────────────────────────────────
frontend:
  enabled: true
  image:
    repository: quickhaul-frontend
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── Backend Services ──────────────────────────────────────────
# Each service shares the same structure.
# containerPort is the port the process listens on inside the container.

locationService:
  enabled: true
  image:
    repository: quickhaul-location
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8001
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

authService:
  enabled: true
  image:
    repository: quickhaul-auth
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8002
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

bookingService:
  enabled: true
  image:
    repository: quickhaul-booking
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8003
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

notificationService:
  enabled: true
  image:
    repository: quickhaul-notification
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8004
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

otpService:
  enabled: true
  image:
    repository: quickhaul-otp
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8005
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

paymentService:
  enabled: true
  image:
    repository: quickhaul-payment
    tag: dev-placeholder
    pullPolicy: IfNotPresent
  replicaCount: 1
  containerPort: 8006
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

# ── ConfigMap (non-sensitive runtime config) ──────────────────
config:
  mongoUri: "mongodb://quickhaul-mongodb:27017"
  redisUrl: "redis://quickhaul-redis:6379/0"
  frontendUrl: "http://localhost"
  # Vite frontend env vars (build-time passed as container env at runtime)
  locationApiUrl: "/api/locations"
  authApiUrl: "/api/auth"
  bookingApiUrl: "/api/bookings"
  notificationApiUrl: "/api/notifications"
  otpApiUrl: "/api/otp"
  paymentApiUrl: "/api/payments"

# ── Secret references (do NOT put real values here) ───────────
# These keys must exist in a pre-created Kubernetes Secret named
# <release>-secrets  (see templates/secrets.example.yaml)
#
# SECRET_KEY  — maps to shared/config.py `secret_key` (used for JWT signing)
# MONGO_PASSWORD / REDIS_PASSWORD — only required if auth is enabled on those services.
#   For the default in-cluster demo mode they are not required.
secretKeys:
  secretKey: SECRET_KEY
  mongoPassword: MONGO_PASSWORD
  redisPassword: REDIS_PASSWORD

# ── Ingress ───────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""           # e.g. "azure/application-gateway" or "nginx"
  annotations: {}
  # azure-agic example:
  # kubernetes.io/ingress.class: azure/application-gateway
  # appgw.ingress.kubernetes.io/ssl-redirect: "true"
  host: ""               # e.g. quickhaul-dev.example.com
  tls: []
  # - secretName: quickhaul-tls
  #   hosts:
  #     - quickhaul-dev.example.com

# ── Service Account ───────────────────────────────────────────
serviceAccount:
  create: false
  name: ""

# ── Gateway API ───────────────────────────────────────────────
gatewayAPI:
  enabled: false
  className: "kong"
    storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
