name: QuickHaul CI/CD

on:
  push:
    branches:
      - feature/dev
      - main
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci-cd.yml'
  pull_request:
    branches:
      - feature/dev
      - main
    paths:
      - 'quickhaul/**'
      - '.github/workflows/quickhaul-ci-cd.yml'

permissions:
  contents: write
  pull-requests: read
  id-token: write

env:
  ACR_NAME: ${{ vars.ACR_NAME }}
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}

jobs:
  detect-changed-services:
    runs-on: ubuntu-latest
    outputs:
      changed_services_json: ${{ steps.detect.outputs.changed_services_json }}
      skip_build: ${{ steps.detect.outputs.skip_build }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
      safe_ref: ${{ steps.vars.outputs.safe_ref }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Calculate Variables
        id: vars
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          SAFE_REF=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "safe_ref=$SAFE_REF" >> $GITHUB_OUTPUT
      - name: Detect Changed Services
        id: detect
        run: |
          cat << 'EOF' > detect.py
          import yaml, json, subprocess, fnmatch
          with open('.github/service-map/quickhaul-services.yml', 'r') as f:
              service_map = yaml.safe_load(f)
              
          try:
              if '${{ github.event_name }}' == 'pull_request':
                  base_sha = '${{ github.event.pull_request.base.sha }}'
                  head_sha = '${{ github.event.pull_request.head.sha }}'
                  cmd = f"git diff --name-only {base_sha} {head_sha}"
                  output = subprocess.check_output(cmd, shell=True, text=True)
                  changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
              else:
                  cmd = "git diff --name-only HEAD^ HEAD"
                  output = subprocess.check_output(cmd, shell=True, text=True)
                  changed_files = [line.strip() for line in output.strip().split('\n') if line.strip()]
          except Exception:
              changed_files = []
              
          docs_only = all(f.endswith('.md') for f in changed_files if f)
          shared_changed = any(f.startswith("quickhaul/backend/shared/") for f in changed_files)
          
          changed_services = []
          if not docs_only and changed_files:
              for svc, details in service_map.items():
                  if shared_changed and details['context_path'] == "quickhaul/backend":
                      changed_services.append(details)
                      continue
                  changed = False
                  for file in changed_files:
                      for path in details['source_paths']:
                          if fnmatch.fnmatch(file, path):
                              changed = True
                              break
                      if changed:
                          break
                  if changed:
                      changed_services.append(details)
          
          if not changed_services:
              changed_services = list(service_map.values())
              
          with open('output.json', 'w') as f:
              json.dump(changed_services, f)
          EOF
          python3 -m pip install pyyaml
          python3 detect.py
          JSON_OUT=$(cat output.json)
          if [ "$JSON_OUT" == "[]" ]; then
             echo "skip_build=true" >> $GITHUB_OUTPUT
             echo "changed_services_json=[{\"service_name\":\"dummy\",\"context_path\":\".\",\"dockerfile_path\":\"Dockerfile\",\"image_name\":\"dummy\",\"helm_values_tag_key\":\"dummy\"}]" >> $GITHUB_OUTPUT
          else
             echo "skip_build=false" >> $GITHUB_OUTPUT
             echo "changed_services_json=$JSON_OUT" >> $GITHUB_OUTPUT
          fi

  lint-testing:
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Running generic linting for changed services"

  sonar-scan:
    name: SonarQube Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, lint-testing]
    if: needs.detect-changed-services.outputs.skip_build == 'false' && github.event_name == 'pull_request'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: true
      run_snyk: false
      run_trivy: false

  snyk-scan:
    name: Snyk Scan (${{ matrix.service.image_name }})
    needs: [detect-changed-services, sonar-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false' && github.event_name == 'pull_request'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/ci-reusable-template.yml@main
    secrets: inherit
    with:
      working_directory: ${{ matrix.service.context_path }}
      run_sonar: false
      run_snyk: true
      run_trivy: false

  build-push-pr:
    name: Build & Push PR Image (${{ matrix.service.image_name }})
    needs: [detect-changed-services, snyk-scan]
    if: needs.detect-changed-services.outputs.skip_build == 'false' && github.event_name == 'pull_request'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: dev-pr-${{ github.event.pull_request.number }}-${{ needs.detect-changed-services.outputs.short_sha }}
      push_image: true

  build-push-merge:
    name: Build & Push Release Image (${{ matrix.service.image_name }})
    needs: [detect-changed-services]
    if: needs.detect-changed-services.outputs.skip_build == 'false' && github.event_name == 'push'
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changed-services.outputs.changed_services_json) }}
    uses: Resolveops-AI/resolveops-templates/.github/workflows/docker-build-push-template.yml@main
    secrets: inherit
    with:
      image_name: ${{ matrix.service.image_name }}
      acr_name: ${{ vars.ACR_NAME }}
      acr_login_server: ${{ vars.ACR_LOGIN_SERVER }}
      dockerfile_path: ${{ matrix.service.dockerfile_path }}
      context_path: ${{ matrix.service.context_path }}
      image_tag: v1.0.${{ github.run_number }}
      push_image: true

  update-helm-values:
    needs: [detect-changed-services, build-push-merge]
    if: needs.detect-changed-services.outputs.skip_build == 'false' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Update values.yaml with Semantic Tag
        run: |
          echo '${{ needs.detect-changed-services.outputs.changed_services_json }}' > changed.json
          SEMANTIC_TAG="v1.0.${{ github.run_number }}"
          
          if [ "${{ github.ref_name }}" == "main" ]; then
             TARGET_FILE="quickhaul/helm/quickhaul/values-prod.yaml"
          else
             TARGET_FILE="quickhaul/helm/quickhaul/values-dev.yaml"
          fi
          
          for row in $(jq -c '.[]' changed.json); do
            KEY=$(echo $row | jq -r '.helm_values_tag_key')
            yq e "${KEY} = \"${SEMANTIC_TAG}\"" -i $TARGET_FILE
          done
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $TARGET_FILE
          git commit -m "chore: update quickhaul image tags to $SEMANTIC_TAG [skip ci]" || echo "No changes to commit"
          git push origin ${{ github.ref_name }}
